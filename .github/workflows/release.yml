name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: claw-guard
            archive: tar.gz
            platform: darwin-amd64
            is_macos: true
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: claw-guard
            archive: tar.gz
            platform: darwin-arm64
            is_macos: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: claw-guard
            archive: tar.gz
            platform: linux-amd64
            is_macos: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: claw-guard
            archive: tar.gz
            platform: linux-arm64
            is_macos: false
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            artifact: claw-guard.exe
            archive: zip
            platform: windows-amd64
            is_macos: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libxkbcommon-dev libgtk-3-dev libglib2.0-dev \
            libatk1.0-dev libpango1.0-dev libgdk-pixbuf-2.0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxcb-render0-dev \
            libwayland-dev libxkbcommon-x11-dev

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Install cross-compilation tools (Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          sudo apt-get install -y -qq gcc-mingw-w64-x86-64

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # ── macOS: .app bundle, sign, notarize, DMG ──────────────────────────
      - name: Import signing certificate
        if: matrix.is_macos && env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import certificate.p12 -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          rm certificate.p12

      - name: Create .app bundle
        if: matrix.is_macos
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BINARY="target/${{ matrix.target }}/release/claw-guard"
          APP_DIR="target/${{ matrix.target }}/release/Claw Guard.app"

          # Generate .icns
          ICONSET_DIR=$(mktemp -d)/icon.iconset
          mkdir -p "$ICONSET_DIR"
          for SIZE in 16 32 64 128 256; do
            sips -z $SIZE $SIZE assets/icon.png --out "$ICONSET_DIR/icon_${SIZE}x${SIZE}.png" >/dev/null 2>&1
          done
          sips -z 32 32   assets/icon.png --out "$ICONSET_DIR/icon_16x16@2x.png"   >/dev/null 2>&1
          sips -z 64 64   assets/icon.png --out "$ICONSET_DIR/icon_32x32@2x.png"   >/dev/null 2>&1
          sips -z 256 256 assets/icon.png --out "$ICONSET_DIR/icon_128x128@2x.png" >/dev/null 2>&1
          iconutil -c icns "$ICONSET_DIR" -o assets/icon.icns 2>/dev/null || true
          rm -rf "$(dirname "$ICONSET_DIR")"

          # Build .app structure
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          cp "$BINARY" "$APP_DIR/Contents/MacOS/claw-guard"
          chmod +x "$APP_DIR/Contents/MacOS/claw-guard"
          sed "s/__VERSION__/${VERSION}/g" macos/Info.plist > "$APP_DIR/Contents/Info.plist"
          [ -f assets/icon.icns ] && cp assets/icon.icns "$APP_DIR/Contents/Resources/icon.icns"

      - name: Sign .app bundle
        if: matrix.is_macos && env.DEVELOPER_ID != ''
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
        run: |
          APP_DIR="target/${{ matrix.target }}/release/Claw Guard.app"
          codesign --force --deep --options runtime \
            --sign "$DEVELOPER_ID" \
            --entitlements macos/entitlements.plist \
            --timestamp \
            "$APP_DIR"
          codesign --verify --deep --strict "$APP_DIR"

      - name: Notarize .app bundle
        if: matrix.is_macos && env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          APP_DIR="target/${{ matrix.target }}/release/Claw Guard.app"
          NOTARIZE_ZIP="target/${{ matrix.target }}/release/notarize.zip"
          ditto -c -k --keepParent "$APP_DIR" "$NOTARIZE_ZIP"
          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple "$APP_DIR"
          rm -f "$NOTARIZE_ZIP"

      - name: Create DMG
        if: matrix.is_macos
        run: |
          APP_DIR="target/${{ matrix.target }}/release/Claw Guard.app"
          DMG_STAGING=$(mktemp -d)
          cp -R "$APP_DIR" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"
          DMG_NAME="ClawGuard-${{ github.ref_name }}-${{ matrix.platform }}.dmg"
          hdiutil create -volname "Claw Guard" \
            -srcfolder "$DMG_STAGING" \
            -ov -format UDZO \
            "$DMG_NAME"
          rm -rf "$DMG_STAGING"
          # Sign DMG if certificate available
          if [ -n "${DEVELOPER_ID:-}" ]; then
            codesign --force --sign "$DEVELOPER_ID" --timestamp "$DMG_NAME"
          fi
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}

      # ── Package CLI binary (all platforms) ───────────────────────────────
      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          STAGING="claw-guard-${{ github.ref_name }}-${{ matrix.platform }}"
          mkdir "$STAGING"
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "$STAGING/"
          tar czf "$STAGING.tar.gz" "$STAGING"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        run: |
          STAGING="claw-guard-${{ github.ref_name }}-${{ matrix.platform }}"
          mkdir "$STAGING"
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "$STAGING/"
          zip -r "$STAGING.zip" "$STAGING"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.platform }}
          path: |
            claw-guard-${{ github.ref_name }}-${{ matrix.platform }}.*
            ClawGuard-${{ github.ref_name }}-${{ matrix.platform }}.dmg

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum claw-guard-*.tar.gz claw-guard-*.zip ClawGuard-*.dmg 2>/dev/null > checksums.txt || sha256sum claw-guard-*.tar.gz claw-guard-*.zip 2>/dev/null > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            claw-guard-*.tar.gz
            claw-guard-*.zip
            ClawGuard-*.dmg
            checksums.txt
