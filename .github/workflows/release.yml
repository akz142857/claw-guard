name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: claw-guard
            archive: tar.gz
            platform: darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: claw-guard
            archive: tar.gz
            platform: darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: claw-guard
            archive: tar.gz
            platform: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: claw-guard
            archive: tar.gz
            platform: linux-arm64
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            artifact: claw-guard.exe
            archive: zip
            platform: windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libxkbcommon-dev libgtk-3-dev libglib2.0-dev \
            libatk1.0-dev libpango1.0-dev libgdk-pixbuf-2.0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxcb-render0-dev \
            libwayland-dev libxkbcommon-x11-dev

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Install cross-compilation tools (Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          sudo apt-get install -y -qq gcc-mingw-w64-x86-64

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          STAGING="claw-guard-${{ github.ref_name }}-${{ matrix.platform }}"
          mkdir "$STAGING"
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "$STAGING/"
          tar czf "$STAGING.tar.gz" "$STAGING"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        run: |
          STAGING="claw-guard-${{ github.ref_name }}-${{ matrix.platform }}"
          mkdir "$STAGING"
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "$STAGING/"
          zip -r "$STAGING.zip" "$STAGING"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.platform }}
          path: claw-guard-${{ github.ref_name }}-${{ matrix.platform }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum claw-guard-*.tar.gz claw-guard-*.zip > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            claw-guard-*.tar.gz
            claw-guard-*.zip
            checksums.txt
